spring.application.name=waypointmap-server
server.port=8088

# P5: GZIP compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,application/vnd.google-earth.kmz,application/zip
server.compression.min-response-size=1024

# P9: Tomcat tuning
spring.mvc.async.request-timeout=30000
server.tomcat.connection-timeout=30000
server.tomcat.max-connections=200
server.tomcat.threads.max=50
