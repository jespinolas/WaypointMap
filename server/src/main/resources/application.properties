spring.application.name=waypointmap-server
server.port=8088

# P5: GZIP compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,application/vnd.google-earth.kmz,application/zip
server.compression.min-response-size=1024

# P9: Tomcat tuning
spring.mvc.async.request-timeout=30000
server.tomcat.connection-timeout=30000
server.tomcat.max-connections=200
server.tomcat.threads.max=50

# H2 file-based database (persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/waypointmap;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
